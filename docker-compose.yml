services:
  kafka:
    image: apache/kafka:3.7.1
    container_name: stenosis-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"

  api:
    image: stenosis-local-app:latest
    pull_policy: never
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stenosis-api
    depends_on:
      - kafka
      - twod-lb
    environment:
      APP_STORAGE_ROOT: /app/runtime_storage
      APP_DB_PATH: /app/runtime_storage/app.db
      APP_NODE_NAME: api-gateway
      APP_2D_UPSTREAM_URL: http://twod-lb:8081/internal/analyze/2d
      APP_2D_NODE_URLS: http://twod-node-1:8001/internal/analyze/2d,http://twod-node-2:8001/internal/analyze/2d
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_KAFKA_TOPIC: stenosis-jobs-3d
      APP_KAFKA_CONSUMER_GROUP: stenosis-worker
      APP_DRIFT_REFERENCE_GLOB: /app/data/train/*.bmp
      APP_DRIFT_REFERENCE_SAMPLE_LIMIT: 12
      APP_YOLO_MODEL_PATH: /app/best.onnx
      APP_SEGRESNET_CHECKPOINT_PATH: /opt/Stenosis3D/models/SegResNet/runs/20260114_183930/checkpoints/best.pt
      APP_TORCH_DEVICE: cpu
    ports:
      - "8000:8000"
    volumes:
      - ./runtime_storage:/app/runtime_storage
      - ./data:/app/data:ro
      - ../Stenosis3D:/opt/Stenosis3D:ro

  twod-node-1:
    image: stenosis-local-app:latest
    pull_policy: never
    container_name: stenosis-twod-node-1
    command: ["uvicorn", "app.twod_node:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      APP_STORAGE_ROOT: /app/runtime_storage
      APP_DB_PATH: /app/runtime_storage/app.db
      APP_NODE_NAME: twod-node-1
      APP_DRIFT_REFERENCE_GLOB: /app/data/train/*.bmp
      APP_DRIFT_REFERENCE_SAMPLE_LIMIT: 12
      APP_YOLO_MODEL_PATH: /app/best.onnx
      APP_TORCH_DEVICE: cpu
    volumes:
      - ./runtime_storage:/app/runtime_storage
      - ./data:/app/data:ro

  twod-node-2:
    image: stenosis-local-app:latest
    pull_policy: never
    container_name: stenosis-twod-node-2
    command: ["uvicorn", "app.twod_node:app", "--host", "0.0.0.0", "--port", "8001"]
    environment:
      APP_STORAGE_ROOT: /app/runtime_storage
      APP_DB_PATH: /app/runtime_storage/app.db
      APP_NODE_NAME: twod-node-2
      APP_DRIFT_REFERENCE_GLOB: /app/data/train/*.bmp
      APP_DRIFT_REFERENCE_SAMPLE_LIMIT: 12
      APP_YOLO_MODEL_PATH: /app/best.onnx
      APP_TORCH_DEVICE: cpu
    volumes:
      - ./runtime_storage:/app/runtime_storage
      - ./data:/app/data:ro

  twod-lb:
    image: nginx:1.27-alpine
    container_name: stenosis-twod-lb
    depends_on:
      - twod-node-1
      - twod-node-2
    volumes:
      - ./infra/twod-lb.nginx.conf:/etc/nginx/conf.d/default.conf:ro

  worker:
    image: stenosis-local-app:latest
    pull_policy: never
    container_name: stenosis-worker
    command: ["python", "-m", "app.worker"]
    depends_on:
      - kafka
      - api
    environment:
      APP_STORAGE_ROOT: /app/runtime_storage
      APP_DB_PATH: /app/runtime_storage/app.db
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_KAFKA_TOPIC: stenosis-jobs-3d
      APP_KAFKA_CONSUMER_GROUP: stenosis-worker
      APP_YOLO_MODEL_PATH: /app/best.onnx
      APP_SEGRESNET_CHECKPOINT_PATH: /opt/Stenosis3D/models/SegResNet/runs/20260114_183930/checkpoints/best.pt
      APP_TORCH_DEVICE: cpu
    volumes:
      - ./runtime_storage:/app/runtime_storage
      - ../Stenosis3D:/opt/Stenosis3D:ro

  frontend:
    image: nginx:1.27-alpine
    container_name: stenosis-frontend
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/styles.css:/usr/share/nginx/html/styles.css:ro
      - ./frontend/app.js:/usr/share/nginx/html/app.js:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: stenosis-prometheus
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.1
    container_name: stenosis-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
