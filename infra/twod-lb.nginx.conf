upstream twod_nodes {
  server twod-node-1:8001 max_fails=3 fail_timeout=10s;
  server twod-node-2:8001 max_fails=3 fail_timeout=10s;
}

server {
  listen 8081;
  server_name _;

  location /internal/analyze/2d {
    proxy_pass http://twod_nodes;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_http_version 1.1;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
  }

  location /health {
    proxy_pass http://twod_nodes/health;
  }
}
